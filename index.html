<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="author" content="KIHO" />
    <meta name="description" content="PORTFOLIO" />
    <title>KIHO.PORTFOLIO</title>
    <link href="image/favicon.png" rel="icon" />
    <link href="reset.css" rel="stylesheet" />
    <link href="style.css" media="all" rel="stylesheet" />
  </head>
  <body>
    <header>
      <h1 id="logo"><a href="index.html">KIHO. PORTFOLIO</a></h1>
      <nav>
        <ul>
          <li><a href="#about">about</a></li>
          <li><a href="works.html">works</a></li>
          <li><a href="#contact">contact</a></li>
        </ul>
      </nav>
    </header>
    <div class="mainvisualDiv">
      <img class="mainvisual" src="image/1PF.png" alt="イメージ画像" />
    </div>
    <main>
      <section id="about">
        <img class="adout-img" src="image/2PF.png" alt="イメージ画像" />
        <div class="about-text">
          <h2>ABOUT</h2>
          <p>
            現在、子育てをしながらWEBデザインやHTML/CSSについて学習しております。<br />前職で培った接客経験を活かし、お客様に寄り添った丁寧な対応を心がけています。<br />「見やすく、伝わりやすいデザイン」を大切にし、一つひとつ誠実に制作してまいります。
          </p>
        </div>
      </section>
      <section class="works">
        <h2>WORKS</h2>
        <div class="worksdiv">
          <p>
            <img
              class="works-img"
              src="image/bannerPF2-1.jpg"
              alt="イメージ画像"
            />
          </p>
          <p>
            <img
              class="works-img"
              src="image/bannerPF3-2.jpg"
              alt="イメージ画像"
            />
          </p>
          <p>
            <img
              class="works-img"
              src="image/bannerPF4-3.jpg"
              alt="イメージ画像"
            />
          </p>
        </div>
        <p class="warks-btn">
          <a class="works-button" href="works.html">View more →</a>
        </p>
      </section>
      <section id="contact">
        <h2>CONTACT</h2>
        <form action="" method="">
          <p>Name<input type="text" name="user_name" /></p>
          <p>Email<input type="email" name="user_mail" /></p>
          <p>Message<textarea name="Message"></textarea></p>
          <p class="submitBtn"><input type="submit" value="Send" /></p>
          <p>※現在お問合せフォームは準備中です。</p>
        </form>
      </section>
      <p class="TOP"><a href="#logo">TOP</a></p>
    </main>
    <footer>
      <p>Copyright 2026 KIHO.</p>
    </footer>
  </body>
</html>
